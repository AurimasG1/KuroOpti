name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore KuroOpti.slnx

      - name: Build solution
        run: dotnet build KuroOpti.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test KuroOpti.slnx --configuration Release --no-build --verbosity normal
      - name: Check for pending EF Core migrations
        run: |
          dotnet tool install --global dotnet-ef
          export PATH="$PATH:/home/runner/.dotnet/tools"

          echo "Checking if EF Core detects pending migrations..."

          dotnet ef migrations add _TempMigrationCheck \
            --project BackEnd/KuroOpti.Data \
            --startup-project BackEnd/KuroOpti.Console \
            --output-dir Migrations \
            --connection "Server=127.0.0.1;Port=3306;Database=testdb;User=root;Password=root" \
            || true

          FILE=$(ls BackEnd/KuroOpti.Data/Migrations/*_TempMigrationCheck*.cs 2>/dev/null || true)

          if [ -z "$FILE" ]; then
            echo "✔ No pending migrations (no file generated)."
            exit 0
          fi

          if grep -q "migrationBuilder" "$FILE"; then
            echo "❌ ERROR: EF Core detected pending model changes!"
            rm -f "$FILE"
            exit 1
          else
            echo "✔ No pending migrations."
            rm -f "$FILE"
          fi
